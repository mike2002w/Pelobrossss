<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PELOBROSSSS</title>
<meta name="theme-color" content="#f6f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pelobrossss">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
  :root{
    --bg1:#f6f7fb; --bg2:#eaeef7; --card:#ffffff; --card2:#f3f5fa; --in:#eef1f8;
    --ink:#1c2230; --mut:#6b7280; --line:#e3e6ef;
    --hot1:#ff6b6b; --hot2:#ff9f1c; --green:#2e9e4f; --gold:#ef7c0c; --blue:#2f6fed;
    --grad:linear-gradient(90deg,#ff6b6b,#ff9f1c);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2)); background-attachment:fixed; color:var(--ink);
    -webkit-font-smoothing:antialiased; padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  .app{max-width:560px; margin:0 auto; padding:14px 14px 0}
  /* top bar */
  .top{display:flex; align-items:center; justify-content:space-between; padding:8px 2px 12px; padding-top:calc(8px + env(safe-area-inset-top))}
  .brand{font-weight:900; font-size:20px; letter-spacing:.5px; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent}
  .top .dt{font-size:12px; color:var(--mut)}
  /* cards */
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(20,30,60,.05)}
  .card.glow{border-color:var(--gold)}
  .card.green{border-color:var(--green)}
  h2{margin:0 0 4px; font-size:17px}
  h3{margin:0; font-size:16px}
  .hint{color:var(--mut); font-size:13px; margin:2px 0 12px; line-height:1.45}
  .row{display:flex; align-items:center; gap:10px}
  .sp{justify-content:space-between}
  .mut{color:var(--mut)} .sm{font-size:12px} .b{font-weight:800}
  .gold{color:var(--gold)} .grn{color:#1f8a47}
  /* buttons */
  button{font-family:inherit}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; background:var(--grad); color:#1a1a2e;
    border:none; border-radius:12px; padding:13px 16px; font-weight:800; font-size:15px; cursor:pointer; width:100%}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:var(--card2); color:var(--ink); border:1px solid var(--line)}
  .btn.sm{padding:9px 12px; font-size:13px; border-radius:10px; width:auto}
  .btn.danger{background:var(--card2); color:#d12f2f; border:1px solid #f0cfcf}
  .pill{display:inline-flex; align-items:center; gap:6px; background:var(--card2); border:1px solid var(--line); color:var(--ink);
    border-radius:999px; padding:9px 14px; font-weight:700; font-size:14px; cursor:pointer}
  .pill.on{background:var(--grad); color:#1a1a2e; border-color:transparent}
  .chips{display:flex; flex-wrap:wrap; gap:8px}
  .typegrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px}
  .typebtn{background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:16px 12px; text-align:center; cursor:pointer}
  .typebtn .em{font-size:24px} .typebtn .nm{font-weight:800; margin-top:4px} .typebtn .sub{font-size:11px; color:var(--mut)}
  .typebtn.suggest{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset}
  /* exercise log */
  .exblock{background:var(--card2); border:1px solid var(--line); border-radius:14px; padding:13px; margin-bottom:12px}
  .exhist{font-size:12px; color:var(--mut); margin:4px 0 10px; line-height:1.5}
  .exhist b{color:#344056}
  .setline{display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--line); font-size:14px}
  .setline:last-child{border-bottom:none}
  .setline .n{width:22px; color:var(--mut); font-size:12px; flex:none}
  .setline .w{font-weight:800}
  .setline .wu{font-size:10px; background:rgba(239,124,12,.14); color:var(--gold); padding:1px 6px; border-radius:5px}
  .setline .x{margin-left:auto; color:#ff9b9b; background:none; border:none; font-size:16px; cursor:pointer; padding:2px 6px}
  .adder{display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap}
  select.inp{background:var(--in); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:11px 8px; font-size:15px; font-weight:700; flex:1; min-width:64px; text-align:center}
  .wutoggle{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--mut)}
  .wutoggle input{width:18px; height:18px}
  /* rest timer */
  #rest{position:fixed; left:50%; transform:translateX(-50%); bottom:calc(80px + env(safe-area-inset-bottom)); z-index:40;
    background:var(--card); border:1px solid var(--gold); border-radius:14px; padding:10px 16px; display:none; align-items:center; gap:12px; box-shadow:0 8px 30px rgba(0,0,0,.5)}
  #rest .t{font-size:20px; font-weight:900; color:var(--gold); font-variant-numeric:tabular-nums}
  #rest button{background:none; border:none; color:var(--mut); font-size:13px; cursor:pointer; font-weight:700}
  /* bottom nav */
  .nav{position:fixed; left:0; right:0; bottom:0; z-index:30; background:rgba(255,255,255,.94); backdrop-filter:blur(8px);
    border-top:1px solid var(--line); display:flex; padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
  .nav button{flex:1; background:none; border:none; color:var(--mut); font-size:11px; font-weight:700; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px}
  .nav button .ic{font-size:20px}
  .nav button.on{color:var(--gold)}
  /* toast / PR */
  #toast{position:fixed; left:50%; top:80px; transform:translateX(-50%) translateY(-20px); z-index:60; opacity:0; transition:.25s;
    background:var(--grad); color:#1a1a2e; font-weight:900; padding:14px 22px; border-radius:14px; text-align:center; box-shadow:0 10px 40px rgba(255,180,40,.5); pointer-events:none; max-width:90%}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  #toast .big{font-size:18px}
  /* charts */
  svg.chart{width:100%; height:auto; display:block}
  .legend{display:flex; gap:14px; flex-wrap:wrap; color:var(--mut); font-size:12px; margin-top:8px}
  .legend i{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}
  .statrow{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px}
  .miniStat{background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:11px; text-align:center}
  .miniStat .n{font-size:20px; font-weight:900; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent}
  .miniStat .l{font-size:10px; color:var(--mut); text-transform:uppercase; letter-spacing:.4px; margin-top:2px}
  .plateau{display:flex; gap:10px; background:var(--card2); border-left:4px solid var(--hot1); border-radius:10px; padding:10px 12px; margin-bottom:9px; font-size:13px}
  .plateau .fix{color:var(--mut); font-size:12px; margin-top:2px}
  /* history */
  .hitem{background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px}
  .hitem .hd{display:flex; justify-content:space-between; align-items:center}
  .hitem .ex{font-size:12px; color:var(--mut); margin-top:6px; line-height:1.5}
  .tag{font-size:10px; padding:2px 8px; border-radius:6px; font-weight:800; text-transform:uppercase; letter-spacing:.4px}
  .t-Push{background:rgba(239,68,68,.12); color:#d12f2f}
  .t-Pull{background:rgba(47,111,237,.12); color:#2f6fed}
  .t-Legs{background:rgba(46,158,79,.14); color:#1f8a47}
  .t-Arms{background:rgba(239,124,12,.14); color:#c96a00}
  .t-Cardio{background:rgba(120,128,170,.14); color:#5b6178}
  .hidden{display:none !important}
  .center{text-align:center}
  .empty{color:var(--mut); text-align:center; padding:30px 10px; font-size:14px}
  textarea{width:100%; height:120px; background:var(--in); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:10px; font-size:12px; font-family:ui-monospace,Menlo,monospace}
  .seg{display:flex; background:var(--card2); border:1px solid var(--line); border-radius:10px; overflow:hidden}
  .seg button{flex:1; background:none; border:none; color:var(--mut); padding:9px; font-weight:700; font-size:13px; cursor:pointer}
  .seg button.on{background:var(--grad); color:#1a1a2e}
  /* modal sheet */
  .overlay{position:fixed; inset:0; z-index:80; background:rgba(20,24,40,.45); display:flex; align-items:flex-end; justify-content:center}
  .sheet{background:var(--card); width:100%; max-width:560px; border-radius:18px 18px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom)); max-height:86vh; overflow:auto; box-shadow:0 -8px 40px rgba(0,0,0,.2)}
  .sheet h3{margin-bottom:10px}
  /* stepper */
  .stepper{display:flex; align-items:center; background:var(--in); border:1px solid var(--line); border-radius:10px; overflow:hidden; flex:1; min-width:120px}
  .stepper button{background:none; border:none; color:var(--gold); font-size:22px; font-weight:800; width:42px; height:44px; cursor:pointer; flex:0 0 auto}
  .stepper button:disabled{color:var(--mut); opacity:.35}
  .stepper .val{flex:1; text-align:center; font-weight:800; font-size:15px; font-variant-numeric:tabular-nums}
  .setline.editing{flex-wrap:wrap; gap:8px; padding:10px 0}
  /* banners */
  .banner{border-radius:12px; padding:11px 32px 11px 14px; font-size:13px; margin-bottom:12px; line-height:1.45; position:relative}
  .banner.info{background:rgba(47,111,237,.08); border:1px solid rgba(47,111,237,.28)}
  .banner.warn{background:rgba(239,124,12,.10); border:1px solid rgba(239,124,12,.32)}
  .banner .bx{position:absolute; top:7px; right:10px; color:var(--mut); cursor:pointer; font-weight:700; font-size:15px}
  /* exercise picker */
  .picklist{display:flex; flex-direction:column; gap:6px; max-height:46vh; overflow:auto}
  .pickrow{display:flex; justify-content:space-between; align-items:center; background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:13px 14px; cursor:pointer; text-align:left; color:var(--ink); font-size:14px; width:100%}
  .pickrow:active{background:var(--in)}
  /* settings */
  .setrow{display:flex; justify-content:space-between; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line)}
  .txin,.dateinp{background:var(--in); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:11px; font-size:15px; font-weight:700; font-family:inherit}
  .dateinp{flex:1}
  .switch{position:relative; width:48px; height:28px; flex:0 0 auto; display:inline-block}
  .switch input{opacity:0; width:0; height:0}
  .switch span{position:absolute; inset:0; background:var(--line); border-radius:999px; transition:.2s; cursor:pointer}
  .switch span:before{content:''; position:absolute; width:22px; height:22px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.3)}
  .switch input:checked + span{background:var(--green)}
  .switch input:checked + span:before{transform:translateX(20px)}
  #gear{background:none; border:none; font-size:18px; cursor:pointer; padding:4px; line-height:1}
</style>
</head>

const KG2LB = 2.2046;
function getToday(){ const d=new Date(); return new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,10); }

function seedModel(){
  let id=1;
  const workouts = SEED.map(([date,type,cardio,exs])=>({
    id:id++, date, type, cardio:cardio||null,
    exercises: exs.map(([name,equip,unit,sets])=>({name, equipment:equip, unit,
      sets: sets.map(([weight,reps,wu])=>({weight,reps,warmup:!!wu})) }))
  }));
  return {workouts, extraCardio:SEED_STAIRS.slice(), draft:null, settings:{restSec:90, kneeMode:false, lastBackupCount:workouts.length}, seeded:true};
}
function load(){
  try{ const raw=localStorage.getItem(KEY); if(raw) return JSON.parse(raw); }catch(e){}
  const m=seedModel(); save(m); return m;
}
function save(m){ DB=m||DB; try{ localStorage.setItem(KEY, JSON.stringify(DB)); }catch(e){} }

function weightOptions(unit){
  if(unit==='bw') return ['BW'];
  const out=[]; if(unit==='kg'){ for(let w=2.5; w<=40; w+=2.5) out.push(w); }
  else { for(let w=5; w<=200; w+=5) out.push(w); }
  return out;
}
const allWorkouts = () => DB.workouts.slice().sort((a,b)=>a.date<b.date?-1:1);
const toLb=(w,u)=> u==='kg'? w*KG2LB : (u==='bw'?0:w);

// history for an exercise: last N sessions (committed) + PR (working sets)
// excludeId: skip a workout (used so an edited workout doesn't compare against itself)
function exerciseHistory(name, equip, excludeId){
  const out=[];
  allWorkouts().forEach(w=>{
    if(excludeId && w.id===excludeId) return;
    const e=w.exercises.find(x=>x.name===name && (!equip||x.equipment===equip));
    if(e){ const working=e.sets.filter(s=>!s.warmup); if(working.length) out.push({date:w.date, unit:e.unit, top:Math.max(...working.map(s=>s.weight)), sets:e.sets}); }
  });
  return out;
}
function prFor(name, equip, excludeId){
  const h=exerciseHistory(name,equip,excludeId); if(!h.length) return null;
  let best=h[0]; h.forEach(x=>{ if(x.top>best.top) best=x; });
  return {weight:best.top, unit:best.unit, date:best.date};
}

   ============================================================ */
function suggestion(){
  const lifts=allWorkouts().filter(w=>w.exercises.some(e=>e.sets.length));
  const last2=lifts.slice(-2).map(w=>w.type);
  const pushy=last2.filter(t=>t==='Push').length;
  const focus = pushy>=1 ? 'Pull' : 'Push';
  const lastLegs=[...lifts].reverse().find(w=>w.type==='Legs');
  const legGap = lastLegs ? Math.round((new Date(TODAY)-new Date(lastLegs.date))/86400000) : 999;
  return {focus, legGap, last2};
}

function defaultStart(unit){ return unit==='kg'?10:(unit==='bw'?0:20); }
function stepDisp(val,unit){ if(unit==='bw') return 'BW'; if(unit==='rep') return ''+val; return val+(unit==='kg'?'kg':'lb'); }
function stepperHTML(id, val, step, unit){
  const dis = unit==='bw'?'disabled':'';
  return `<div class="stepper" data-stid="${id}" data-val="${val}" data-step="${step}" data-unit="${unit}">
    <button data-d="-1" ${dis} aria-label="decrease">−</button><span class="val">${stepDisp(val,unit)}</span><button data-d="1" ${dis} aria-label="increase">+</button></div>`;
}
function renderExList(){
  const d=DB.draft, host=document.getElementById('exList'); if(!host) return;
  const ex0=d.editId; // exclude self from history while editing
  let html='';
  if(d.cardio){
    const c=d.cardio;
    html += `<div class="exblock"><div class="row sp"><h3>🏃 ${c.machine}</h3><button class="btn ghost sm" data-editcardio="1">edit</button></div>
      <div class="exhist">${cardioSummary(c)}</div></div>`;
  }
  d.exercises.forEach((ex,ix)=>{
    const hist=exerciseHistory(ex.name, ex.equipment, ex0).slice(-3);
    const pr=prFor(ex.name, ex.equipment, ex0);
    const histTxt = hist.length
      ? 'Last: '+hist.map(h=>`<b>${h.top}${unitSuffix(h.unit)}</b> ${fmtShort(h.date)}`).join(' · ') + (pr?` · PR <b class="gold">${pr.weight}${unitSuffix(pr.unit)}</b>`:'')
      : 'No history yet — set the first benchmark! 🔥';
    const last = ex.sets.length? ex.sets[ex.sets.length-1] : null;
    const startW = ex.unit==='bw'?0:(last?last.weight:(hist.length?hist[hist.length-1].top:defaultStart(ex.unit)));
    const startR = last?last.reps:8;
    const step = ex.unit==='kg'?2.5:5;
    html += `<div class="exblock">
      <div class="row sp"><h3>${ex.name} <span class="mut sm">${ex.equipment}</span></h3>
        <button class="btn danger sm" data-rmex="${ix}" aria-label="remove exercise">✕</button></div>
      <div class="exhist">${histTxt}</div>
      ${ex.sets.map((s,si)=>{
        if(editing && editing.ix===ix && editing.si===si){
          const est = ex.unit==='kg'?2.5:5;
          return `<div class="setline editing"><span class="n">${si+1}</span>
            ${stepperHTML('ew'+ix, s.weight, est, ex.unit)}<span class="mut">×</span>${stepperHTML('er'+ix, s.reps, 1, 'rep')}
            <label class="wutoggle"><input type="checkbox" data-ewu ${s.warmup?'checked':''}>warm</label>
            <button class="btn sm" data-saveset="${ix}.${si}" aria-label="save">✓</button>
            <button class="btn ghost sm" data-canceledit="1" aria-label="cancel">✕</button></div>`;
        }
        const wdisp = ex.unit==='bw'?'BW':s.weight+unitSuffix(ex.unit);
        return `<div class="setline" data-editset="${ix}.${si}"><span class="n">${si+1}</span>
          <span class="w">${wdisp}</span><span class="mut">× ${s.reps}</span>
          ${s.warmup?'<span class="wu">warmup</span>':''}
          <button class="x" data-rmset="${ix}.${si}" aria-label="delete set">✕</button></div>`;
      }).join('')}
      <div class="adder">
        ${stepperHTML('w'+ix, startW, step, ex.unit)}
        <span class="mut">×</span>
        ${stepperHTML('r'+ix, startR, 1, 'rep')}
        <label class="wutoggle"><input type="checkbox" data-wu="${ix}">warm</label>
        <button class="btn sm" data-addset="${ix}">Add</button>
      </div>
    </div>`;
  });
  host.innerHTML=html;
  // steppers
  host.querySelectorAll('.stepper button').forEach(b=>b.onclick=(e)=>{ e.stopPropagation();
    const st=b.closest('.stepper'), unit=st.dataset.unit; if(unit==='bw') return;
    let v=parseFloat(st.dataset.val), step=parseFloat(st.dataset.step);
    v=Math.max(unit==='rep'?1:0, +(v + (+b.dataset.d)*step).toFixed(2));
    st.dataset.val=v; st.querySelector('.val').textContent=stepDisp(v,unit);
  });
  const sval=(id)=>{ const el=host.querySelector(`[data-stid="${id}"]`); return el?parseFloat(el.dataset.val):0; };
  host.querySelectorAll('[data-addset]').forEach(b=>b.onclick=()=>{
    const ix=+b.dataset.addset, ex=DB.draft.exercises[ix];
    const w = ex.unit==='bw'?0:sval('w'+ix);
    const r = Math.round(sval('r'+ix));
    const wu = host.querySelector(`[data-wu="${ix}"]`).checked;
    addSet(ix, w, r, wu);
  });
  host.querySelectorAll('[data-editset]').forEach(el=>el.onclick=(e)=>{
    if(e.target.closest('button')) return;
    const [ix,si]=el.dataset.editset.split('.').map(Number); editing={ix,si}; renderExList();
  });
  host.querySelectorAll('[data-saveset]').forEach(b=>b.onclick=()=>{
    const [ix,si]=b.dataset.saveset.split('.').map(Number), ex=DB.draft.exercises[ix];

    const [ix,si]=b.dataset.rmset.split('.').map(Number);
    DB.draft.exercises[ix].sets.splice(si,1); editing=null; save(); renderExList();
  });
  host.querySelectorAll('[data-rmex]').forEach(b=>b.onclick=()=>{
    DB.draft.exercises.splice(+b.dataset.rmex,1); editing=null; save(); renderExList();
  });
  const ec=host.querySelector('[data-editcardio]'); if(ec) ec.onclick=openCardioModal;

function addSet(ix, weight, reps, warmup){
  const ex=DB.draft.exercises[ix], ex0=DB.draft.editId;
  // PR checks BEFORE adding (compare against committed history)
  const pr=prFor(ex.name, ex.equipment, ex0);
  let repPR=false;
  if(!warmup && ex.unit!=='bw' && pr && weight<=pr.weight){
    let bestRepsAt=0;
    exerciseHistory(ex.name, ex.equipment, ex0).forEach(h=>h.sets.forEach(st=>{ if(!st.warmup && st.weight===weight && st.reps>bestRepsAt) bestRepsAt=st.reps; }));
    if(bestRepsAt>0 && reps>bestRepsAt) repPR=true;
  }
  ex.sets.push({weight, reps, warmup}); save(); renderExList();
  startRest();
  if(!warmup && ex.unit!=='bw'){
    if(!pr || weight>pr.weight) celebratePR(ex.name, weight, ex.unit, pr);
    else if(repPR) celebrateRepPR(ex.name, weight, reps, ex.unit);
  }
}

function plateauAlerts(){
  const checks=[['Single Arm Lat Pulldown','Cable'],['Shoulder Press','DB'],['Smith Rows','Smith'],['Bench Press','Smith'],['Tricep Extensions','DB']];
  const out=[];
  checks.forEach(([n,eq])=>{
    const h=exerciseHistory(n,eq); if(h.length<4) return;
    const recent=h.slice(-4); const top=recent[recent.length-1].top;
    const stuck=recent.every(x=>x.top===top);
    if(stuck) out.push(`<div class="plateau"><div>🔒</div><div><b>${n}</b> stuck at <span class="gold">${top}${unitSuffix(recent[0].unit)}</span> for ${recent.length}+ sessions.
      <div class="fix">Try +1 set, 3-sec negatives, or a rep PR (3×10–12) before adding load.</div></div></div>`);
  });
  // legs gap
  const sg=suggestion();
  if(sg.legGap>21) out.push(`<div class="plateau" style="border-left-color:var(--green)"><div>🦵</div><div><b>Legs neglected — ${sg.legGap} days.</b><div class="fix">Knee's recovered. Restart light: Smith squats 30–40, RDLs 25–35, calves.</div></div></div>`);
  return out.length?out.join(''):'<div class="empty">No plateaus detected — everything\'s moving! 🔥</div>';
}

/* ---- tiny self-contained SVG charts ---- */
function lineChart(series,color){
  if(series.length<2) return '<div class="empty">Not enough data yet.</div>';
  const W=320,H=140,p=24;
  const xs=series.map(s=>+new Date(s.x)); const ys=series.map(s=>s.y);
  const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
  const X=v=>p+(W-2*p)*((v-xmin)/(xmax-xmin||1));
  const Y=v=>H-p-(H-2*p)*((v-ymin)/(ymax-ymin||1));
  const pts=series.map(s=>`${X(+new Date(s.x))},${Y(s.y)}`).join(' ');
  const dots=series.map(s=>`<circle cx="${X(+new Date(s.x))}" cy="${Y(s.y)}" r="3" fill="${color}"/>`).join('');
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">
    <line x1="${p}" y1="${H-p}" x2="${W-p}" y2="${H-p}" stroke="#e3e6ef"/>
    <text x="${p}" y="14" fill="#6b7280" font-size="10">${ymax}</text>
    <text x="${p}" y="${H-p+14}" fill="#6b7280" font-size="10">${fmtShort(series[0].x)}</text>
    <text x="${W-p}" y="${H-p+14}" fill="#6b7280" font-size="10" text-anchor="end">${fmtShort(series[series.length-1].x)}</text>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5"/>${dots}</svg>`;
}
function weeklyVolChart(){
  function wk(d){ const dt=new Date(d+'T00:00'); const day=(dt.getDay()+6)%7; dt.setDate(dt.getDate()-day); return dt.toISOString().slice(0,10); }
  const by={}; allWorkouts().forEach(w=>{ let v=0; w.exercises.forEach(e=>e.sets.forEach(s=>{ if(!s.warmup) v+=toLb(s.weight,e.unit)*s.reps; })); const k=wk(w.date); by[k]=(by[k]||0)+v; });
  const keys=Object.keys(by).sort(); if(!keys.length) return '<div class="empty">No data.</div>';
  const vals=keys.map(k=>by[k]); const max=Math.max(...vals);
  const W=320,H=130,p=20,bw=(W-2*p)/keys.length*0.7;
  const bars=keys.map((k,i)=>{ const x=p+(W-2*p)*(i/(keys.length||1)); const h=(H-2*p)*(by[k]/(max||1)); return `<rect x="${x}" y="${H-p-h}" width="${bw}" height="${h}" rx="2" fill="#ff6b6b"/>`; }).join('');
  return `<svg class="chart" viewBox="0 0 ${W} ${H}"><line x1="${p}" y1="${H-p}" x2="${W-p}" y2="${H-p}" stroke="#e3e6ef"/>
    <text x="${p}" y="14" fill="#6b7280" font-size="10">${(max/1000).toFixed(0)}k lb</text>${bars}</svg>`;
}
function pplBars(){
  const c={Push:0,Pull:0,Legs:0,Arms:0,Cardio:0}; allWorkouts().forEach(w=>c[w.type]++);
  const max=Math.max(...Object.values(c),1); const col={Push:'#ef5350',Pull:'#3b82f6',Legs:'#2e9e4f',Arms:'#f0a020',Cardio:'#8b8fb0'};
  return Object.entries(c).map(([k,v])=>`<div class="row" style="margin:6px 0"><div style="width:54px" class="sm">${k}</div>
    <div style="flex:1; background:#eef1f8; border-radius:6px; overflow:hidden"><div style="width:${100*v/max}%; background:${col[k]}; height:16px"></div></div>
    <div style="width:24px; text-align:right" class="b">${v}</div></div>`).join('');
}

function dl(name,text,type){ const b=new Blob([text],{type}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function exportJSON(){ DB.settings.lastBackupCount=DB.workouts.length; save(); dl('pelobrossss-backup.json', JSON.stringify(DB,null,2), 'application/json'); toast('💾 Exported JSON','Backup saved'); }
function exportText(){
  let t='PELOBROSSSS LOG\n\n';
  allWorkouts().forEach(w=>{ t+=`${w.date} [${w.type}]\n`; if(w.cardio)t+='  '+cardioSummary(w.cardio)+'\n';
    w.exercises.forEach(e=>{ t+=`  ${e.name}: ${e.sets.map(s=>s.weight+(s.warmup?'w':'')+'x'+s.reps).join(' | ')}\n`; }); t+='\n'; });

function importData(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{ try{ const m=JSON.parse(r.result); if(!m.workouts) throw 0; DB=m;
      DB.settings=DB.settings||{}; if(DB.settings.restSec==null)DB.settings.restSec=90; if(DB.settings.kneeMode==null)DB.settings.kneeMode=false; if(DB.settings.lastBackupCount==null)DB.settings.lastBackupCount=DB.workouts.length;
      save(); toast('✅ Imported','Data restored'); renderHistory(); }catch(e){ toast('❌ Import failed','Could not read that file'); } };
    r.readAsText(f); };
  inp.click();
}
